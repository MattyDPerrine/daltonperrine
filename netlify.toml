[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# NOTE: The @astrojs/netlify adapter automatically handles SSR routing via
# Netlify Functions. Do NOT add a catch-all redirect here — it would intercept
# SSR requests before Netlify Functions can respond.
#
# Static 404 handling is done by Astro's src/pages/404.astro.

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for the admin dashboard
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
